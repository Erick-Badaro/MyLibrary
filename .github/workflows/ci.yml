name: CI - MyLibrary

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Permissão de execução no mvnw
        run: chmod +x mvnw
        working-directory: mylibrary

      - name: Executar testes
        run: ./mvnw --no-transfer-progress verify
        working-directory: mylibrary
        env:
          JWT_SECRET_RAW: "test-secret-para-ci-32bytes-minimo!!"
          DB_NAME: "testdb"

      - name: Publicar relatório de cobertura (JaCoCo)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: mylibrary/target/site/jacoco/
