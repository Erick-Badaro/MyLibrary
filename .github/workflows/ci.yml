name: CI - MyLibrary

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test:
    name: Executar Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Permissão de execução no mvnw
        run: chmod +x mvnw
        working-directory: mylibrary

      - name: Executar testes
        run: ./mvnw test --no-transfer-progress
        working-directory: mylibrary

  build:
    name: Build da Aplicação
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Permissão de execução no mvnw
        run: chmod +x mvnw
        working-directory: mylibrary

      - name: Realizar empacotamento (pulando testes)
        run: ./mvnw package -DskipTests --no-transfer-progress
        working-directory: mylibrary
